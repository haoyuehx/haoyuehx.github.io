name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - master   # 监听 master 分支的推送

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # 如果主题是 submodule，拉取子模块

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true    # 如果你需要 Sass/SCSS 等

      - name: Build
        run: hugo --minify  # 生成静态文件到 ./public

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages  # 推送到 gh-pages 分支
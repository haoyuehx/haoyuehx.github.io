name: Build and deploy Hugo site

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGO_VERSION: 0.148.1

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: |
            resources/_gen
            ~/.cache/hugo_cache
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}-${{ hashFiles('hugo.toml', 'content/**', 'layouts/**', 'assets/**') }}
          restore-keys: |
            hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}-

      - name: Refresh Bangumi data
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: python3 scripts/fetch_bangumi.py

      - name: Configure GitHub Pages
        id: pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Build site for validation
        if: github.event_name == 'pull_request'
        run: hugo --gc --minify

      - name: Build site for deployment
        if: github.event_name != 'pull_request'
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Check generated site
        run: test -f public/index.html && test -f public/404.html && test -f public/sitemap.xml

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

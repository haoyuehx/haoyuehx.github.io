{{ define "main" }}

<!-- Title and summary -->
<section class="links-page container">
    <div class="links-header">
        <div class="container-fluid px-0">
            <h1 class="links-title">{{ .Title }}</h1>
            <p class="links-summary">{{ .Summary }}</p>
        </div>
    </div>

    <div class="links-grid mb-5">
        {{ range .Params.link_cards }}
        {{ partial "card_link.html" . }}
        {{ end }}
    </div>
</section>

{{ end }}
